name: Check PR #5 feedback

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  check-feedback:
    runs-on: ubuntu-latest
    env:
      REPO_OWNER: ylytdeng
      REPO_NAME: wechat-decrypt
      PR_NUMBER: "5"
    steps:
      - name: Check for new feedback in last 1 hour
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          API_BASE="https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}"
          PRACTIVE=$PR_NUMBER
          THRESHOLD=$(( $(date -u +%s) - 3600 ))

          fetch_and_check() {
            local name="$1"
            local url="$2"
            local time_field="$3"
            local summary_file="$4"
            local tmp
            tmp=$(mktemp)

            if ! curl -sS -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$url" > "$tmp"; then
              echo "${name}: fetch failed" >&2
              return 1
            fi

            local count
            count=$(python - "$name" "$time_field" "$THRESHOLD" "$tmp" "$summary_file" <<'PY'
import json
import datetime
import sys

name, field, threshold, path, summary_path = sys.argv[1], sys.argv[2], int(sys.argv[3]), sys.argv[4], sys.argv[5]

with open(path, "r", encoding="utf-8") as f:
    data = json.load(f)
if not isinstance(data, list):
    data = [data]

def is_recent(ts):
    if not ts:
        return False
    t = ts.replace("Z", "+00:00")
    dt = datetime.datetime.fromisoformat(t)
    return int(dt.timestamp()) >= threshold

items = []
for item in data:
    ts = item.get(field)
    if not ts:
        continue
    if is_recent(ts):
        author = item.get("user", {}).get("login", "unknown")
            item_url = item.get("html_url", "")
            body = (item.get("body") or "").strip().replace("\n", " ")
            items.append((author, ts, item_url, body[:140]))

with open(summary_path, "a", encoding="utf-8") as out:
    if items:
        out.write(f"## New feedback for {name}\n")
    for author, ts, link, body in items:
        out.write(f"- {author} | {ts} | {link} | {body}\n")
print(f"{name}:{len(items)}")
PY
            )

            rm -f "$tmp"
            echo "$count"
          }

          SUMMARY=$(mktemp)
          TOTAL=0
          HITS=$(fetch_and_check "Pull Request review threads" "${API_BASE}/pulls/${PRACTIVE}/reviews?per_page=100" "submitted_at" "$SUMMARY" || true)
          TOTAL=$((TOTAL + ${HITS#*:}))
          HITS=$(fetch_and_check "Pull Request inline comments" "${API_BASE}/pulls/${PRACTIVE}/comments?per_page=100" "created_at" "$SUMMARY" || true)
          TOTAL=$((TOTAL + ${HITS#*:}))
          HITS=$(fetch_and_check "Pull Request issue comments" "${API_BASE}/issues/${PRACTIVE}/comments?per_page=100" "created_at" "$SUMMARY" || true)
          TOTAL=$((TOTAL + ${HITS#*:}))

          {
            echo "# PR #${PRACTIVE} feedback check"
            if [ "$TOTAL" -eq 0 ]; then
              echo "- No feedback in the last 1 hour."
            else
              echo "- Found ${TOTAL} new feedback item(s) in the last 1 hour."
              cat "$SUMMARY"
            fi
          } > "$GITHUB_STEP_SUMMARY"
          rm -f "$SUMMARY"
